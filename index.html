<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TERU TERU GOLF EASY v2</title>
<style>
:root{--bg:#07101d;--card:#111a2a;--box:#172435;--in:#070e1a;--line:#2c3a50;--txt:#f7f8fb;--muted:#9ca8b8;--gold:#e8bb3f;--green:#4ac789;--red:#ff6868}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;padding-bottom:30px}
header{position:sticky;top:0;z-index:9;background:rgba(7,16,29,.96);text-align:center;padding:24px 12px 16px;border-bottom:1px solid var(--line)}
h1{margin:0;font-size:23px;letter-spacing:3px;font-weight:900}.sub{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:2px;margin-top:8px}
main{max-width:850px;margin:auto;padding:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0}.title{font-size:18px;font-weight:900;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:6px}input,select{width:100%;background:var(--in);color:var(--txt);border:1px solid var(--line);border-radius:14px;padding:13px;font-size:17px}
button{border:0;border-radius:16px;padding:15px 12px;font-size:17px;font-weight:900}.full{width:100%;margin-top:10px}.gold{background:var(--gold);color:#111}.green{background:var(--green);color:#05130c}.red{background:var(--red);color:#fff}
.box{background:var(--box);border:1px solid var(--line);border-radius:18px;padding:12px}.hole{font-size:42px;font-weight:900;color:var(--gold);line-height:1}.status{margin-top:8px;color:var(--green);font-size:18px;font-weight:900;min-height:24px}.small{font-size:13px;color:var(--muted);line-height:1.6}
.scoreBox{background:var(--box);border:1px solid var(--line);border-radius:20px;padding:14px}.pname{font-size:21px;font-weight:900}.badge{display:inline-block;background:var(--gold);color:#111;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;margin-top:6px}
.step{display:grid;grid-template-columns:70px 1fr 70px;gap:8px;align-items:center;margin:12px 0}.step button{font-size:28px;background:#263346;color:#fff;border:1px solid var(--line)}.num{height:62px;display:flex;align-items:center;justify-content:center;background:var(--in);border:1px solid var(--line);border-radius:16px;font-size:34px;font-weight:900}
.quick{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:10px}.quick button{background:#0d1726;color:var(--muted);border:1px solid var(--line);padding:10px 0;font-size:16px}
.opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.opt{background:#0d1726;color:var(--muted);border:1px solid var(--line);font-size:13px;padding:12px 4px}.opt.on{background:var(--gold);color:#111}
.result{text-align:center}.winner{font-size:25px;font-weight:900;line-height:1.3;margin:8px 0}.points{font-size:30px;color:var(--gold);font-weight:900}.teamview{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.teambox{background:var(--box);border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.teamnum{font-size:31px;font-weight:900}
.totalRow{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}.plus{color:var(--green);font-weight:900}.minus{color:var(--red);font-weight:900}
.hist{border-bottom:1px solid var(--line);padding:12px 0;font-size:14px;line-height:1.6}.pill{display:inline-block;background:rgba(232,187,63,.12);border:1px solid rgba(232,187,63,.35);color:#f5d47a;border-radius:999px;padding:6px 10px;margin:4px;font-size:12px;font-weight:900}
details summary{cursor:pointer;color:var(--gold);font-weight:900;margin-bottom:10px}.actions{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 25%,var(--bg));padding:24px 0 6px}
@media(max-width:700px){.grid,.grid4,.teamview{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>TERU TERU GOLF</h1><div class="sub">EASY LAS VEGAS SCORE APP v2</div></header>
<main>
<div class="card" id="topCard"><div class="small">現在のホール</div><div class="hole"><span id="holeView">1</span>H</div><div id="status" class="status"></div><div class="small" id="teamLine"></div></div>

<details class="card" open><summary>名前・打順</summary>
<div class="grid">
<div class="box"><label>プレイヤー1</label><input id="name1" value="てるや"></div>
<div class="box"><label>プレイヤー2</label><input id="name2" value="佐藤"></div>
<div class="box"><label>プレイヤー3</label><input id="name3" value="田中"></div>
<div class="box"><label>プレイヤー4</label><input id="name4" value="鈴木"></div>
</div><button class="full gold" type="button" onclick="applyNames()">名前を反映</button>
<div class="grid4" style="margin-top:10px">
<div><label>1番</label><select id="order1" onchange="syncAll()"><option value="1" selected>てるや</option><option value="2">佐藤</option><option value="3">田中</option><option value="4">鈴木</option></select></div>
<div><label>2番</label><select id="order2" onchange="syncAll()"><option value="1">てるや</option><option value="2" selected>佐藤</option><option value="3">田中</option><option value="4">鈴木</option></select></div>
<div><label>3番</label><select id="order3" onchange="syncAll()"><option value="1">てるや</option><option value="2">佐藤</option><option value="3" selected>田中</option><option value="4">鈴木</option></select></div>
<div><label>4番</label><select id="order4" onchange="syncAll()"><option value="1">てるや</option><option value="2">佐藤</option><option value="3">田中</option><option value="4" selected>鈴木</option></select></div>
</div></details>

<details class="card"><summary>設定</summary><div class="grid">
<div><label>ホール</label><input id="hole" type="number" value="1" min="1" onchange="setHole(Number(this.value||1))"></div>
<div><label>丸め方</label><select id="roundMode"><option value="none">そのまま</option><option value="up5" selected>5点切り上げ</option><option value="down10">10点切り下げ</option><option value="up10">10点切り上げ</option></select></div>
<div><label>オプション</label><select id="optionOn"><option value="on" selected>ON</option><option value="off">OFF</option></select></div>
<div><label>次ホール打順</label><select id="nextMode"><option value="score" selected>スコア順</option><option value="rotate">単純ローテ</option><option value="keep">そのまま</option></select></div>
<div><label>砂イチ</label><input id="sandPt" type="number" value="10" onchange="syncAll()"></div>
<div><label>チップイン</label><input id="chipPt" type="number" value="10" onchange="syncAll()"></div>
<div><label>ロングパット</label><input id="puttPt" type="number" value="10" onchange="syncAll()"></div>
<div><label>タコ発動打数</label><input id="takoScore" type="number" value="8"></div>
<div><label>タコ設定</label><select id="takoOn"><option value="on" selected>ON</option><option value="off">OFF</option></select></div>
</div></details>

<div class="card"><div class="title">スコア入力</div><div class="grid">
<div class="scoreBox"><div class="pname" id="label1">1番</div><span class="badge">1番・4番側</span><div class="step"><button type="button" onclick="addScore(1,-1)">−</button><div class="num" id="scoreView1">4</div><button type="button" onclick="addScore(1,1)">＋</button></div><div class="quick"><button type="button" onclick="setScore(1,3)">3</button><button type="button" onclick="setScore(1,4)">4</button><button type="button" onclick="setScore(1,5)">5</button><button type="button" onclick="setScore(1,6)">6</button><button type="button" onclick="setScore(1,7)">7</button></div><div class="opts"><button type="button" id="sand1" class="opt" onclick="toggleOpt('sand',1)">砂イチ<br><span id="sandTxt1"></span></button><button type="button" id="chip1" class="opt" onclick="toggleOpt('chip',1)">チップ<br><span id="chipTxt1"></span></button><button type="button" id="putt1" class="opt" onclick="toggleOpt('putt',1)">パット<br><span id="puttTxt1"></span></button></div></div>
<div class="scoreBox"><div class="pname" id="label2">2番</div><span class="badge">2番・3番側</span><div class="step"><button type="button" onclick="addScore(2,-1)">−</button><div class="num" id="scoreView2">4</div><button type="button" onclick="addScore(2,1)">＋</button></div><div class="quick"><button type="button" onclick="setScore(2,3)">3</button><button type="button" onclick="setScore(2,4)">4</button><button type="button" onclick="setScore(2,5)">5</button><button type="button" onclick="setScore(2,6)">6</button><button type="button" onclick="setScore(2,7)">7</button></div><div class="opts"><button type="button" id="sand2" class="opt" onclick="toggleOpt('sand',2)">砂イチ<br><span id="sandTxt2"></span></button><button type="button" id="chip2" class="opt" onclick="toggleOpt('chip',2)">チップ<br><span id="chipTxt2"></span></button><button type="button" id="putt2" class="opt" onclick="toggleOpt('putt',2)">パット<br><span id="puttTxt2"></span></button></div></div>
<div class="scoreBox"><div class="pname" id="label3">3番</div><span class="badge">2番・3番側</span><div class="step"><button type="button" onclick="addScore(3,-1)">−</button><div class="num" id="scoreView3">4</div><button type="button" onclick="addScore(3,1)">＋</button></div><div class="quick"><button type="button" onclick="setScore(3,3)">3</button><button type="button" onclick="setScore(3,4)">4</button><button type="button" onclick="setScore(3,5)">5</button><button type="button" onclick="setScore(3,6)">6</button><button type="button" onclick="setScore(3,7)">7</button></div><div class="opts"><button type="button" id="sand3" class="opt" onclick="toggleOpt('sand',3)">砂イチ<br><span id="sandTxt3"></span></button><button type="button" id="chip3" class="opt" onclick="toggleOpt('chip',3)">チップ<br><span id="chipTxt3"></span></button><button type="button" id="putt3" class="opt" onclick="toggleOpt('putt',3)">パット<br><span id="puttTxt3"></span></button></div></div>
<div class="scoreBox"><div class="pname" id="label4">4番</div><span class="badge">1番・4番側</span><div class="step"><button type="button" onclick="addScore(4,-1)">−</button><div class="num" id="scoreView4">4</div><button type="button" onclick="addScore(4,1)">＋</button></div><div class="quick"><button type="button" onclick="setScore(4,3)">3</button><button type="button" onclick="setScore(4,4)">4</button><button type="button" onclick="setScore(4,5)">5</button><button type="button" onclick="setScore(4,6)">6</button><button type="button" onclick="setScore(4,7)">7</button></div><div class="opts"><button type="button" id="sand4" class="opt" onclick="toggleOpt('sand',4)">砂イチ<br><span id="sandTxt4"></span></button><button type="button" id="chip4" class="opt" onclick="toggleOpt('chip',4)">チップ<br><span id="chipTxt4"></span></button><button type="button" id="putt4" class="opt" onclick="toggleOpt('putt',4)">パット<br><span id="puttTxt4"></span></button></div></div>
</div><div class="actions"><button class="full gold" type="button" onclick="calculate()">計算</button><button class="full green" type="button" onclick="saveHole()">記録して次ホールへ</button></div></div>

<div class="card result"><div class="small">結果</div><div id="winner" class="winner">---</div><div id="pointText" class="points">0ポイント</div><div class="teamview"><div class="teambox"><small id="teamAName"></small><div id="teamANum" class="teamnum">--</div></div><div class="teambox"><small id="teamBName"></small><div id="teamBNum" class="teamnum">--</div></div></div><div id="detail" class="small" style="margin-top:10px">スコアを入力してください</div><div id="optDetail" class="small" style="margin-top:8px;text-align:left"></div></div>
<div class="card"><div class="title">個人合計ポイント</div><div id="totalArea"></div><button class="full red" type="button" onclick="resetAll()">リセット</button></div>
<div class="card"><div class="title">記録</div><div id="historyArea" class="small">まだ記録はありません</div></div>
</main>
<script>
var names=["てるや","佐藤","田中","鈴木"],scores=[4,4,4,4],opts=[{},{},{},{}],totals=[0,0,0,0],history=[];
function E(id){return document.getElementById(id)}function V(id){return E(id).value}function N(id){return Number(E(id).value||0)}function T(id,t){E(id).textContent=t}function H(id,t){E(id).innerHTML=t}function esc(s){return String(s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]})}
function setHole(h){if(h<1)h=1;E("hole").value=h;T("holeView",h)}
function readNames(){names=[V("name1")||"プレイヤー1",V("name2")||"プレイヤー2",V("name3")||"プレイヤー3",V("name4")||"プレイヤー4"]}
function applyNames(){readNames();for(var pos=1;pos<=4;pos++){var s=E("order"+pos),cur=s.value;s.innerHTML="";for(var i=1;i<=4;i++){var o=document.createElement("option");o.value=i;o.textContent=names[i-1];s.appendChild(o)}s.value=cur}syncAll();T("status","名前を反映しました")}
function orderArray(){var a=[+V("order1"),+V("order2"),+V("order3"),+V("order4")],seen={};for(var i=0;i<4;i++){if(seen[a[i]])return null;seen[a[i]]=1}return a}
function syncAll(){readNames();var a=orderArray();if(!a)return;for(var p=1;p<=4;p++)T("label"+p,p+"番　"+names[a[p-1]-1]);T("teamLine","1・4番："+names[a[0]-1]+"・"+names[a[3]-1]+" / 2・3番："+names[a[1]-1]+"・"+names[a[2]-1]);for(var i=1;i<=4;i++){T("sandTxt"+i,"+"+N("sandPt"));T("chipTxt"+i,"+"+N("chipPt"));T("puttTxt"+i,"+"+N("puttPt"))}renderTotals()}
function setScore(p,n){scores[p-1]=n;T("scoreView"+p,n)}function addScore(p,d){setScore(p,Math.max(1,scores[p-1]+d))}
function toggleOpt(k,p){opts[p-1][k]=!opts[p-1][k];E(k+p).classList.toggle("on",!!opts[p-1][k])}
function optList(pos,pid){var r=[],o=opts[pos-1];if(V("optionOn")==="off")return r;if(o.sand)r.push({name:names[pid-1],label:"砂イチ",point:N("sandPt")});if(o.chip)r.push({name:names[pid-1],label:"チップイン",point:N("chipPt")});if(o.putt)r.push({name:names[pid-1],label:"ロングパット",point:N("puttPt")});return r}
function optPts(r){return r.reduce(function(s,x){return s+x.point},0)}function optText(r){return r.length?r.map(function(x){return x.name+"："+x.label+" +"+x.point}).join(" / "):"なし"}
function vegas(a,b){var lo=Math.min(a,b),hi=Math.max(a,b);return (V("takoOn")==="on"&&hi>=N("takoScore"))?Number(""+hi+lo):Number(""+lo+hi)}
function round(diff){var m=V("roundMode");if(m==="up5")return Math.ceil(diff/5)*5;if(m==="down10")return Math.floor(diff/10)*10;if(m==="up10")return Math.ceil(diff/10)*10;return diff}
function calculate(){readNames();var a=orderArray();if(!a){alert("打順に同じ人がいます");return null}var an=vegas(scores[0],scores[3]),bn=vegas(scores[1],scores[2]),diff=Math.abs(an-bn),base=round(diff),ar=optList(1,a[0]).concat(optList(4,a[3])),br=optList(2,a[1]).concat(optList(3,a[2])),ao=optPts(ar),bo=optPts(br),ap=0,bp=0;if(an<bn)ap+=base;if(bn<an)bp+=base;ap+=ao;bp+=bo;var net=ap-bp,aname=names[a[0]-1]+"・"+names[a[3]-1],bname=names[a[1]-1]+"・"+names[a[2]-1],win="引き分け";if(net>0)win=aname+" +"+net+"ポイント";if(net<0)win=bname+" +"+Math.abs(net)+"ポイント";T("winner",win);T("pointText",Math.abs(net)+"ポイント");T("teamAName","1番・4番　"+aname);T("teamBName","2番・3番　"+bname);T("teamANum",an);T("teamBNum",bn);H("detail",'<span class="pill">差 '+diff+' → '+base+'ポイント</span><span class="pill">オプション '+ao+' / '+bo+'</span>');H("optDetail","1・4番："+esc(optText(ar))+"<br>2・3番："+esc(optText(br)));return {hole:N("hole"),order:a,scores:scores.slice(),aName:aname,bName:bname,aNum:an,bNum:bn,diff:diff,base:base,aOpt:ao,bOpt:bo,aRec:ar,bRec:br,net:net,aIds:[a[0],a[3]],bIds:[a[1],a[2]]}}
function nextOrder(r){if(V("nextMode")==="keep")return r.order;if(V("nextMode")==="rotate")return [r.order[1],r.order[2],r.order[3],r.order[0]];return [{id:r.order[0],s:r.scores[0],p:1},{id:r.order[1],s:r.scores[1],p:2},{id:r.order[2],s:r.scores[2],p:3},{id:r.order[3],s:r.scores[3],p:4}].sort(function(x,y){return (x.s-y.s)||(x.p-y.p)}).map(function(x){return x.id})}
function saveHole(){var r=calculate();if(!r)return;r.aIds.forEach(function(id){totals[id-1]+=r.net});r.bIds.forEach(function(id){totals[id-1]-=r.net});history.push(r);setHole(r.hole+1);var nx=nextOrder(r);for(var i=1;i<=4;i++)E("order"+i).value=nx[i-1];scores=[4,4,4,4];opts=[{},{},{},{}];for(var p=1;p<=4;p++){setScore(p,4);["sand","chip","putt"].forEach(function(k){E(k+p).classList.remove("on")})}syncAll();renderHistory();T("winner","---");T("pointText","0ポイント");T("teamANum","--");T("teamBNum","--");T("detail","次ホールのスコアを入力してください");T("optDetail","");T("status",r.hole+"Hを記録 → "+(r.hole+1)+"Hへ進みました");window.scrollTo({top:0,behavior:"smooth"})}
function renderTotals(){H("totalArea",names.map(function(n,i){var p=totals[i]||0,cls=p>0?"plus":p<0?"minus":"",sg=p>0?"+":"";return '<div class="totalRow"><div>'+esc(n)+'</div><div class="'+cls+'">'+sg+p+'ポイント</div></div>'}).join(""))}
function renderHistory(){if(!history.length){T("historyArea","まだ記録はありません");return}H("historyArea",history.slice().reverse().map(function(r){var w=r.net>0?r.aName+" +"+r.net+"ポイント":r.net<0?r.bName+" +"+Math.abs(r.net)+"ポイント":"引き分け";return '<div class="hist"><b>'+r.hole+'H　'+esc(w)+'</b><br>1・4番 '+esc(r.aName)+'：'+r.aNum+'<br>2・3番 '+esc(r.bName)+'：'+r.bNum+'<br>差'+r.diff+'→'+r.base+' / オプション '+r.aOpt+':'+r.bOpt+'<br>1・4番：'+esc(optText(r.aRec))+'<br>2・3番：'+esc(optText(r.bRec))+'</div>'}).join(""))}
function resetAll(){totals=[0,0,0,0];history=[];setHole(1);E("order1").value=1;E("order2").value=2;E("order3").value=3;E("order4").value=4;scores=[4,4,4,4];opts=[{},{},{},{}];for(var p=1;p<=4;p++){setScore(p,4);["sand","chip","putt"].forEach(function(k){E(k+p).classList.remove("on")})}syncAll();renderHistory();T("winner","---");T("pointText","0ポイント");T("teamANum","--");T("teamBNum","--");T("status","リセットしました")}
syncAll();
</script></body></html>
