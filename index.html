<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1f7a4d"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TERU GOLF"/>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>TERU TERU GOLF</title>
  <style>
    :root{
      --bg:#f4f6f1;--card:#fff;--text:#111;--muted:#777;--line:#e6e6e6;
      --green:#1f7a4d;--dark:#202020;--red:#c0392b;--soft:#edf7f1;--yellow:#fff8df;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;padding-bottom:env(safe-area-inset-bottom)}
    header{position:sticky;top:0;z-index:10;text-align:center;padding:calc(14px + env(safe-area-inset-top)) 14px 12px;background:rgba(244,246,241,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    h1{margin:0;font-size:21px;letter-spacing:.6px;font-weight:950}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}
    main{max-width:860px;margin:0 auto;padding:0 12px 34px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.035)}
    .title{font-size:15px;font-weight:950;margin-bottom:10px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
    input,select{width:100%;padding:13px 10px;border:1px solid var(--line);border-radius:13px;background:#fff;font-size:17px}
    .player-row{padding:10px;border:1px solid var(--line);border-radius:16px;background:#fafafa;margin-bottom:8px}
    .order-row{display:grid;grid-template-columns:58px 1fr;gap:8px;align-items:end;padding:10px;border:1px solid var(--line);border-radius:16px;background:#fafafa;margin-bottom:8px}
    .order-num{font-size:18px;font-weight:950;text-align:center;color:var(--green);padding-bottom:13px}
    .score-card{border:1px solid var(--line);border-radius:18px;background:#fafafa;padding:12px;margin-bottom:10px}
    .score-head{display:grid;grid-template-columns:1fr 88px;gap:8px;align-items:end;margin-bottom:9px}
    .name-label{font-size:17px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .team-badge{display:inline-block;margin-top:4px;font-size:11px;color:var(--green);font-weight:900;background:var(--soft);border-radius:999px;padding:3px 8px}
    .option-grid{display:grid;grid-template-columns:1fr;gap:7px}
    .option{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:14px;font-weight:800}
    .option small{color:var(--muted);font-size:11px;font-weight:700}
    .option input{width:auto;transform:scale(1.25)}
    button{width:100%;border:0;border-radius:16px;padding:15px;font-size:17px;font-weight:950;color:#fff;background:var(--green);margin-top:9px}
    button.dark{background:var(--dark)} button.red{background:var(--red)} button.light{background:#555}
    .result{text-align:center;padding:18px 10px}
    .big{font-size:34px;font-weight:950;margin:8px 0}
    .point-display{font-size:28px;font-weight:950;margin-top:4px}
    .small{font-size:13px;color:var(--muted);line-height:1.65}
    .pill{display:inline-block;background:var(--soft);color:var(--green);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:950;margin:3px}
    .team-view{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .team-box{background:#fafafa;border:1px solid var(--line);border-radius:16px;padding:11px;text-align:center}
    .team-box strong{display:block;font-size:14px;margin-bottom:5px}.team-box .num{font-size:28px;font-weight:950}
    .total-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line);font-size:16px}
    .total-row:last-child{border-bottom:0}.total-name{font-weight:900}.total-point{font-size:20px;font-weight:950}
    .plus{color:var(--green)}.minus{color:var(--red)}
    .history-row{display:grid;grid-template-columns:40px 1fr auto;gap:8px;align-items:start;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}
    .history-row:last-child{border-bottom:0}.win{color:var(--green);font-weight:950}.lose{color:var(--red);font-weight:950}
    .option-record{margin-top:4px;color:#555;font-size:12px;line-height:1.55}
    .note{font-size:12px;color:var(--muted);margin-top:8px}.warn{background:var(--yellow);border:1px solid #f0d98b;border-radius:14px;padding:10px;font-size:13px;line-height:1.55;margin-top:10px}
    @media(max-width:620px){.grid,.team-view{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.big{font-size:31px}}
  </style>
</head>
<body>
<header>
  <h1>TERU TERU GOLF</h1>
  <div class="sub">ラスベガス計算アプリ</div>
</header>

<main>
  <div class="card">
    <div class="title">プレイヤー名</div>
    <div class="grid">
      <div class="player-row"><label>プレイヤー1</label><input id="p1name" value="てるや"></div>
      <div class="player-row"><label>プレイヤー2</label><input id="p2name" value="佐藤"></div>
      <div class="player-row"><label>プレイヤー3</label><input id="p3name" value="田中"></div>
      <div class="player-row"><label>プレイヤー4</label><input id="p4name" value="鈴木"></div>
    </div>
    <button class="light" onclick="saveNames()">名前を保存</button>
  </div>

  <div class="card">
    <div class="title">このホールの打順</div>
    <div class="grid">
      <div class="order-row"><div class="order-num">1番</div><div><label>プレイヤー</label><select id="order1"></select></div></div>
      <div class="order-row"><div class="order-num">2番</div><div><label>プレイヤー</label><select id="order2"></select></div></div>
      <div class="order-row"><div class="order-num">3番</div><div><label>プレイヤー</label><select id="order3"></select></div></div>
      <div class="order-row"><div class="order-num">4番</div><div><label>プレイヤー</label><select id="order4"></select></div></div>
    </div>
    <div class="warn">チームは自動で「1番・4番」vs「2番・3番」。記録すると、次ホールへ進んで打順も更新されます。</div>
    <button class="light" onclick="advanceOrderOnly()">打順だけ次へ回す</button>
  </div>

  <div class="card">
    <div class="title">設定</div>
    <div class="grid3">
      <div><label>ホール</label><input id="hole" type="number" value="1" min="1" max="18"></div>
      <div><label>オプション</label><select id="optionEnabled"><option value="on" selected>ON</option><option value="off">OFF</option></select></div>
      <div><label>丸め方</label><select id="roundMode"><option value="none">そのまま</option><option value="up5" selected>5点切り上げ</option><option value="down10">10点切り下げ</option><option value="up10">10点切り上げ</option></select></div>
    </div>
    <div class="grid" style="margin-top:10px;">
      <div><label>砂イチ</label><input id="sandPoint" type="number" value="10" min="0"></div>
      <div><label>チップイン</label><input id="chipPoint" type="number" value="10" min="0"></div>
      <div><label>ロングパット</label><input id="puttPoint" type="number" value="10" min="0"></div>
      <div><label>タコ発動打数</label><input id="takoScore" type="number" value="8" min="1"></div>
    </div>
    <div style="margin-top:10px;">
      <label>タコ設定</label>
      <select id="takoMode"><option value="reverse" selected>反転する</option><option value="none">反転しない</option></select>
    </div>
  </div>

  <div class="card">
    <div class="title">スコア入力</div>
    <div id="scoreArea" class="grid"></div>
    <button onclick="calculate()">計算</button>
    <button class="dark" onclick="saveHole()">このホールを記録して次へ</button>
  </div>

  <div class="card result">
    <div class="small">結果</div>
    <div class="big" id="winner">---</div>
    <div class="point-display" id="points">0ポイント</div>
    <div class="team-view">
      <div class="team-box"><strong id="teamAname">1番・4番</strong><div class="num" id="teamAnum">--</div></div>
      <div class="team-box"><strong id="teamBname">2番・3番</strong><div class="num" id="teamBnum">--</div></div>
    </div>
    <div class="small" id="detail" style="margin-top:10px;">スコアを入力して計算してください</div>
    <div class="small" id="optionDetail" style="margin-top:6px;"></div>
    <div id="warn" class="warn" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="title">個人合計ポイント</div>
    <div id="totalArea"></div>
    <button class="red" onclick="resetAll()">合計・記録をリセット</button>
  </div>

  <div class="card">
    <div class="title">記録</div>
    <div id="history" class="small">まだ記録はありません</div>
  </div>
</main>

<script>
const PLAYER_COUNT=4;
let totals=JSON.parse(localStorage.getItem("ttg_option_record_totals")||"[0,0,0,0]");
let history=JSON.parse(localStorage.getItem("ttg_option_record_history")||"[]");

function val(id){return Number(document.getElementById(id).value||0)}
function text(id){return document.getElementById(id).value.trim()}
function checked(id){const el=document.getElementById(id); return !!(el && el.checked)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function getName(i){return text(`p${i}name`) || `プレイヤー${i}`}

function saveNames(){
  localStorage.setItem("ttg_option_record_names",JSON.stringify([1,2,3,4].map(i=>getName(i))));
  renderOrderSelects(getOrderSafe());
  renderScoreInputs(true);
  renderTotals();
  calculate();
}
function loadNames(){
  const names=JSON.parse(localStorage.getItem("ttg_option_record_names")||"null");
  if(!names)return;
  names.forEach((n,idx)=>document.getElementById(`p${idx+1}name`).value=n);
}
function playerOptions(){
  return [1,2,3,4].map(i=>({id:i,name:getName(i)}));
}
function getOrderSafe(){
  try{
    const o=[1,2,3,4].map(i=>Number(document.getElementById(`order${i}`).value));
    return new Set(o).size===4 ? o : [1,2,3,4];
  }catch(e){
    return JSON.parse(localStorage.getItem("ttg_option_record_order")||"[1,2,3,4]");
  }
}
function setOrder(order){
  for(let i=1;i<=4;i++){
    const sel=document.getElementById(`order${i}`);
    if(sel) sel.value=order[i-1];
  }
  localStorage.setItem("ttg_option_record_order",JSON.stringify(order));
}
function renderOrderSelects(order){
  const opts=playerOptions();
  for(let pos=1;pos<=4;pos++){
    const sel=document.getElementById(`order${pos}`);
    sel.innerHTML=opts.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("");
    sel.value=order[pos-1] || pos;
    sel.onchange=()=>{
      localStorage.setItem("ttg_option_record_order",JSON.stringify(getOrderSafe()));
      renderScoreInputs(true);
      calculate();
    };
  }
}
function nextOrder(order){
  return [order[1],order[2],order[3],order[0]];
}
function advanceOrderOnly(){
  const n=nextOrder(getOrderSafe());
  renderOrderSelects(n);
  setOrder(n);
  renderScoreInputs(false);
  calculate();
}
function readCurrentScoresAndOptions(){
  const data={};
  [1,2,3,4].forEach(i=>{
    const scoreEl=document.getElementById(`p${i}score`);
    data[i]={
      score:scoreEl ? scoreEl.value : "",
      sand:checked(`p${i}_sand`),
      chip:checked(`p${i}_chip`),
      putt:checked(`p${i}_putt`)
    };
  });
  return data;
}
function renderScoreInputs(keepValues){
  const old=keepValues ? readCurrentScoresAndOptions() : {};
  const area=document.getElementById("scoreArea");
  const order=getOrderSafe();
  let html="";
  order.forEach((pid,idx)=>{
    const pos=idx+1;
    const teamText=(pos===1||pos===4) ? "1番・4番側" : "2番・3番側";
    const o=old[pid] || {};
    html+=`
      <div class="score-card">
        <div class="score-head">
          <div>
            <div class="name-label">${pos}番　${escapeHtml(getName(pid))}</div>
            <span class="team-badge">${teamText}</span>
          </div>
          <div><label>打数</label><input id="p${pid}score" type="number" value="${escapeHtml(o.score || "")}" min="1" inputmode="numeric"></div>
        </div>
        <div class="option-grid">
          <label class="option">砂イチ <small>+${val("sandPoint") || 10}</small><input type="checkbox" id="p${pid}_sand" ${o.sand?"checked":""}></label>
          <label class="option">チップイン <small>+${val("chipPoint") || 10}</small><input type="checkbox" id="p${pid}_chip" ${o.chip?"checked":""}></label>
          <label class="option">ロングパット <small>+${val("puttPoint") || 10}</small><input type="checkbox" id="p${pid}_putt" ${o.putt?"checked":""}></label>
        </div>
      </div>`;
  });
  area.innerHTML=html;
}
function validateOrder(order){
  return new Set(order).size===4;
}
function optionListForPlayer(id){
  const list=[];
  if(checked(`p${id}_sand`)) list.push({key:"sand", label:"砂イチ", point:val("sandPoint")});
  if(checked(`p${id}_chip`)) list.push({key:"chip", label:"チップイン", point:val("chipPoint")});
  if(checked(`p${id}_putt`)) list.push({key:"putt", label:"ロングパット", point:val("puttPoint")});
  return list;
}
function getTeamPlayers(){
  const order=getOrderSafe();
  const warnEl=document.getElementById("warn");
  if(!validateOrder(order)){
    warnEl.style.display="block";
    warnEl.textContent="打順に同じ人が入っています。4人それぞれ別にしてください。";
    return null;
  }
  const mk=(id,pos)=>({
    id, pos, name:getName(id), score:val(`p${id}score`),
    options:optionListForPlayer(id)
  });
  const all=[mk(order[0],1),mk(order[1],2),mk(order[2],3),mk(order[3],4)];
  const missing=all.filter(p=>!p.score || p.score<1);
  if(missing.length){
    warnEl.style.display="block";
    warnEl.textContent="4人分の打数を入力してください。";
    return null;
  }
  warnEl.style.display="none";
  return {a:[all[0],all[3]], b:[all[1],all[2]], all};
}
function makeVegasNumber(scores){
  const low=Math.min(...scores), high=Math.max(...scores);
  let num=Number(String(low)+String(high));
  if(document.getElementById("takoMode").value==="reverse" && high>=val("takoScore")){
    num=Number(String(high)+String(low));
  }
  return num;
}
function roundPoints(diff){
  const mode=document.getElementById("roundMode").value;
  if(mode==="none")return diff;
  if(mode==="up5")return Math.ceil(diff/5)*5;
  if(mode==="down10")return Math.floor(diff/10)*10;
  if(mode==="up10")return Math.ceil(diff/10)*10;
  return diff;
}
function optionPoints(players){
  if(document.getElementById("optionEnabled").value==="off") return 0;
  return players.reduce((sum,p)=>sum+p.options.reduce((s,o)=>s+o.point,0),0);
}
function optionRecords(players){
  if(document.getElementById("optionEnabled").value==="off") return [];
  return players.flatMap(p=>p.options.map(o=>({playerId:p.id, playerName:p.name, label:o.label, point:o.point})));
}
function optionText(records){
  if(!records || records.length===0) return "オプションなし";
  return records.map(r=>`${escapeHtml(r.playerName)}：${escapeHtml(r.label)} +${r.point}`).join(" / ");
}
function teamLabel(players){return players.map(p=>p.name).join("・")}
function calculate(){
  const teams=getTeamPlayers();
  if(!teams){
    document.getElementById("winner").textContent="入力確認";
    document.getElementById("points").textContent="--";
    document.getElementById("teamAnum").textContent="--";
    document.getElementById("teamBnum").textContent="--";
    document.getElementById("optionDetail").textContent="";
    return null;
  }
  const aNum=makeVegasNumber(teams.a.map(p=>p.score));
  const bNum=makeVegasNumber(teams.b.map(p=>p.score));
  const rawDiff=Math.abs(aNum-bNum);
  const basePoint=roundPoints(rawDiff);
  const aOpt=optionPoints(teams.a);
  const bOpt=optionPoints(teams.b);
  const aRecords=optionRecords(teams.a);
  const bRecords=optionRecords(teams.b);
  let aPoint=0,bPoint=0;
  if(aNum<bNum)aPoint+=basePoint;
  if(bNum<aNum)bPoint+=basePoint;
  aPoint+=aOpt;bPoint+=bOpt;
  const net=aPoint-bPoint;
  const aName=teamLabel(teams.a), bName=teamLabel(teams.b);
  let finalWinner="引き分け";
  if(net>0)finalWinner=aName+" +"+net+"ポイント";
  if(net<0)finalWinner=bName+" +"+Math.abs(net)+"ポイント";
  document.getElementById("winner").textContent=finalWinner;
  document.getElementById("points").textContent=Math.abs(net)+"ポイント";
  document.getElementById("teamAname").textContent="1番・4番　"+aName;
  document.getElementById("teamBname").textContent="2番・3番　"+bName;
  document.getElementById("teamAnum").textContent=aNum;
  document.getElementById("teamBnum").textContent=bNum;
  document.getElementById("detail").innerHTML=`<span class="pill">差 ${rawDiff} → ${basePoint}ポイント</span><span class="pill">オプション 1・4番 ${aOpt} / 2・3番 ${bOpt}</span>`;
  document.getElementById("optionDetail").innerHTML=`1・4番：${optionText(aRecords)}<br>2・3番：${optionText(bRecords)}`;
  return {hole:val("hole"),aName,bName,aNum,bNum,rawDiff,basePoint,aOpt,bOpt,net,order:getOrderSafe(),aIds:teams.a.map(p=>p.id),bIds:teams.b.map(p=>p.id),aRecords,bRecords};
}
function saveHole(){
  const r=calculate();
  if(!r)return;
  r.aIds.forEach(id=>totals[id-1]+=r.net);
  r.bIds.forEach(id=>totals[id-1]-=r.net);
  history.push(r);

  const newHole=Math.min(18,val("hole")+1);
  document.getElementById("hole").value=newHole;

  const n=nextOrder(r.order);
  renderOrderSelects(n);
  setOrder(n);
  renderScoreInputs(false);
  saveState();
  renderTotals();
  renderHistory();
  calculate();
}
function saveState(){
  localStorage.setItem("ttg_option_record_totals",JSON.stringify(totals));
  localStorage.setItem("ttg_option_record_history",JSON.stringify(history));
  localStorage.setItem("ttg_option_record_order",JSON.stringify(getOrderSafe()));
}
function renderTotals(){
  const el=document.getElementById("totalArea");
  el.innerHTML=[1,2,3,4].map(i=>{
    const p=totals[i-1]||0;
    const cls=p>0?"plus":p<0?"minus":"";
    const sign=p>0?"+":"";
    return `<div class="total-row"><div class="total-name">${escapeHtml(getName(i))}</div><div class="total-point ${cls}">${sign}${p}ポイント</div></div>`;
  }).join("");
}
function renderHistory(){
  const el=document.getElementById("history");
  if(history.length===0){el.textContent="まだ記録はありません";return}
  el.innerHTML=history.map(r=>{
    const txt=r.net>0?`<span class="win">${escapeHtml(r.aName)} +${r.net}</span>`:r.net<0?`<span class="lose">${escapeHtml(r.bName)} +${Math.abs(r.net)}</span>`:`<span>±0</span>`;
    return `<div class="history-row">
      <div>${r.hole}H</div>
      <div>
        1・4番 ${escapeHtml(r.aName)}：${r.aNum}<br>
        2・3番 ${escapeHtml(r.bName)}：${r.bNum}<br>
        <span class="small">差${r.rawDiff}→${r.basePoint} / オプション ${r.aOpt}:${r.bOpt}</span>
        <div class="option-record">1・4番：${optionText(r.aRecords)}</div>
        <div class="option-record">2・3番：${optionText(r.bRecords)}</div>
      </div>
      <div>${txt}</div>
    </div>`;
  }).join("");
}
function resetAll(){
  totals=[0,0,0,0];history=[];saveState();renderTotals();renderHistory();
  document.getElementById("winner").textContent="---";
  document.getElementById("points").textContent="0ポイント";
  document.getElementById("teamAnum").textContent="--";
  document.getElementById("teamBnum").textContent="--";
  document.getElementById("detail").textContent="スコアを入力して計算してください";
  document.getElementById("optionDetail").textContent="";
}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}
loadNames();
const initialOrder=JSON.parse(localStorage.getItem("ttg_option_record_order")||"[1,2,3,4]");
renderOrderSelects(initialOrder);
renderScoreInputs(false);
renderTotals();
renderHistory();
</script>
</body>
</html>
